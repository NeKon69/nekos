name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            clang-format

      - name: Check format
        run: git clang-format --diff --quiet "origin/${{ github.base_ref }}" -- '*.cpp' '*.h' '*.hpp' '*.c'

  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            clang \
            cmake \
            g++-multilib \
            gcc-multilib \
            git \
            grub-common \
            grub-pc-bin \
            just \
            lld \
            mtools \
            qemu-system-x86 \
            xorriso

      - name: Build debug
        run: just build

      - name: Test debug
        run: just test
